---
driver:
  name: exec
  gui: false
  customize:
    memory: 4096

transport:
  name: exec

lifecycle:
  pre_converge:
    - remote: . { Invoke-WebRequest -useb https://omnitruck.chef.io/install.ps1 } | Invoke-Expression; Install-Project -project chef -channel current
    - remote: $env:PATH = "C:\opscode\chef\bin;C:\opscode\chef\embedded\bin;" + $env:PATH
    - remote: chef-client -v
    - remote: ohai -v
    - remote: rake --version
    - remote: bundle -v
    # Fix gem environment and rebuild libyajl2 in chef environment
    - remote: gem uninstall -I libyajl2
    - remote: gem install libyajl2 --force --no-doc
    - remote: gem install appbundler --no-doc
    - remote: gem install appbundle-updater -v "~> 1.0.36" --no-doc
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    - remote: $env:PATH = "C:\opscode\chef\embedded\bin;" + $env:PATH; appbundle-updater chef chef <%= ENV['GITHUB_SHA']  || %x(git rev-parse HEAD).chomp %> --tarball --github <%= ENV['GITHUB_REPOSITORY']  || "chef/chef" %>
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    - remote: Write-Output "Installed Chef / Ohai release:"
    - remote: chef-client -v
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    - remote: ohai -v
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    # htmldiff and ldiff on windows cause a conflict with gems being loaded below. we remove them here.
    - remote: if (Test-Path C:\opscode\chef\embedded\bin\htmldiff) { Remove-Item -Path C:\opscode\chef\embedded\bin\htmldiff; Remove-Item -Path C:\opscode\chef\embedded\bin\ldiff }
    # Install test dependencies with debugging and timeout handling
    - remote: Write-Output "=== Bundle Install Debug Info ==="
    - remote: Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    - remote: Write-Output "Network connectivity test..."
    - remote: Test-NetConnection rubygems.org -Port 443 -InformationLevel Detailed
    - remote: Write-Output "Gem environment..."
    - remote: gem env
    - remote: Write-Output "Bundle config..."
    - remote: bundle config
    - remote: Write-Output "Starting bundle install with timeout handling..."
    - remote: Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    - remote: $env:BUNDLE_RETRY = "3"; $env:BUNDLE_TIMEOUT = "180"; $env:BUNDLE_JOBS = "1"; bundle install --retry=3 --verbose
    - remote: Write-Output "Bundle install completed!"
    - remote: Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }

platforms:
  - name: windows-2025
  - name: windows-2022