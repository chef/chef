---
driver:
  name: exec
  gui: false
  customize:
    memory: 4096

transport:
  name: exec

lifecycle:
  pre_converge:
    # Install omnibus Chef with development tools (minimal, just what we need)
    - remote: . { Invoke-WebRequest -useb https://omnitruck.chef.io/install.ps1 } | Invoke-Expression; Install-Project -project chef -channel current
    - remote: $env:PATH = "C:\opscode\chef\bin;C:\opscode\chef\embedded\bin;" + $env:PATH
    # Verify base installation
    - remote: chef-client -v
    - remote: ohai -v
    # Install build tools and compile Chef from source
    - remote: gem install appbundler --no-doc
    - remote: gem install appbundle-updater -v "~> 1.0.36" --no-doc
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    # Force rebuild of libyajl2 in omnibus Chef environment (required for ffi-yajl)
    - remote: C:\opscode\chef\embedded\bin\gem.bat uninstall -I libyajl2
    - remote: C:\opscode\chef\embedded\bin\gem.bat install libyajl2 --force --no-doc
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    # Build and install Chef from source
    - remote: ruby -S appbundle-updater chef chef <%= ENV['GITHUB_SHA']  || %x(git rev-parse HEAD).chomp %> --tarball --github <%= ENV['GITHUB_REPOSITORY']  || "chef/chef" %>
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    - remote: Write-Output "Installed Chef / Ohai release:"
    - remote: chef-client -v
    - remote: ohai -v
    # Install test dependencies with timeout and retries
    - remote: Write-Output "=== Bundle Install Debug Info ==="
    - remote: Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    - remote: Write-Output "Network connectivity test..."
    - remote: Test-NetConnection rubygems.org -Port 443 -InformationLevel Detailed
    - remote: Write-Output "Gem environment..."
    - remote: gem env
    - remote: Write-Output "Bundle config..."
    - remote: bundle config
    - remote: Write-Output "Pre-installing problematic gems individually..."
    - remote: gem install metaclass --no-doc --verbose
    - remote: Write-Output "Starting bundle install with verbose logging..."
    - remote: Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    - remote: $env:BUNDLE_RETRY = "3"; $env:BUNDLE_TIMEOUT = "180"; $env:BUNDLE_JOBS = "1"; bundle install --retry=3 --verbose
    - remote: Write-Output "Bundle install completed!"
    - remote: Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }

platforms:
  - name: windows-2025
  - name: windows-2022
