---
driver:
  name: exec
  gui: false
  customize:
    memory: 4096

transport:
  name: exec

lifecycle:
  pre_converge:
    # Use existing chef-workstation installation as base
    - remote: $env:PATH = "C:\opscode\chef-workstation\bin;C:\opscode\chef-workstation\embedded\bin;" + $env:PATH
    - remote: chef-client -v
    - remote: ohai -v
    - remote: rake --version
    - remote: bundle -v
    # Install source code dependencies and build
    - remote: C:\opscode\chef-workstation\embedded\bin\gem.bat install appbundler --no-doc
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    - remote: C:\opscode\chef-workstation\embedded\bin\gem.bat install appbundle-updater -v "~> 1.0.36" --no-doc
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    # Build and install Chef from source
    - remote: C:\opscode\chef-workstation\embedded\bin\appbundle-updater.bat chef chef <%= ENV['GITHUB_SHA']  || %x(git rev-parse HEAD).chomp %> --tarball --github <%= ENV['GITHUB_REPOSITORY']  || "chef/chef" %>
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    - remote: Write-Output "Installed Chef / Ohai release:"
    - remote: chef-client -v
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    - remote: ohai -v
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }
    # Install test dependencies
    - remote: bundle install --jobs=3 --retry=3
    - remote: If ($lastexitcode -ne 0) { Exit $lastexitcode }

platforms:
  - name: windows-2025
  - name: windows-2022
