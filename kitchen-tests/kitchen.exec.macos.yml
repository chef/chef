---
driver:
  name: exec
  gui: false
  customize:
    memory: 4096

transport:
  name: exec

lifecycle:
  pre_converge:
    - remote: brew install coreutils
    - remote: curl https://omnitruck.chef.io/install.sh | sudo bash -s -- -P chef -c current
    - remote: export PATH="/opt/chef/bin:/opt/chef/embedded/bin:$PATH"
    - remote: echo "Chef / Ohai release:"
    - remote: /opt/chef/bin/chef-client -v
    - remote: /opt/chef/bin/ohai -v
    - remote: echo "Installing appbundler and appbundle-updater gems:"
    - remote: sudo /opt/chef/embedded/bin/gem install appbundler appbundle-updater --no-doc
    - remote: echo "Updating Chef from local checkout:"
    - remote: sudo rm -rf /opt/chef/embedded/apps/chef && sudo mkdir -p /opt/chef/embedded/apps/chef
    - remote: export GIT_SHA="<%= ENV['GITHUB_SHA'] || %x(git rev-parse HEAD).chomp %>"
    - remote: sudo rsync -a --exclude='.git' --exclude='kitchen-tests/.kitchen' --exclude='.bundle' --exclude='.ruby-version' <%= File.expand_path('..', __dir__) %>/ /opt/chef/embedded/apps/chef/
    - remote: cd /opt/chef/embedded/apps/chef && sudo env -i HOME=/root PATH=/opt/chef/embedded/bin:/usr/bin:/bin /opt/chef/embedded/bin/ruby /opt/chef/embedded/bin/bundle config set --local without 'server docgen maintenance pry integration ci chefstyle profile' && sudo env -i HOME=/root PATH=/opt/chef/embedded/bin:/usr/bin:/bin /opt/chef/embedded/bin/ruby /opt/chef/embedded/bin/bundle install --jobs 4
    - remote: cd /opt/chef/embedded/apps/chef && sudo env -i HOME=/root PATH=/opt/chef/embedded/bin:/usr/bin:/bin /opt/chef/embedded/bin/ruby /opt/chef/embedded/bin/gem build chef.gemspec && GEMFILE=$(ls -t chef-*.gem | head -1) && sudo env -i HOME=/root PATH=/opt/chef/embedded/bin:/usr/bin:/bin /opt/chef/embedded/bin/ruby /opt/chef/embedded/bin/gem install --local --ignore-dependencies --no-document "$GEMFILE" && sudo rm -f "$GEMFILE"
    - remote: cd /opt/chef/embedded/apps/chef && sudo env -i HOME=/root PATH=/opt/chef/embedded/bin:/usr/bin:/bin /opt/chef/embedded/bin/ruby /opt/chef/embedded/bin/appbundler /opt/chef/embedded/apps/chef /opt/chef/embedded/bin
    - remote: cd /opt/chef/embedded/apps/chef/chef-utils && sudo /opt/chef/embedded/bin/gem build chef-utils.gemspec && GEMFILE=$(ls -t chef-utils-*.gem | head -1) && sudo /opt/chef/embedded/bin/gem install --local --no-doc "$GEMFILE" && sudo rm -f "$GEMFILE"
    - remote: cd /opt/chef/embedded/apps/chef/chef-config && sudo /opt/chef/embedded/bin/gem build chef-config.gemspec && GEMFILE=$(ls -t chef-config-*.gem | head -1) && sudo /opt/chef/embedded/bin/gem install --local --ignore-dependencies --no-doc "$GEMFILE" && sudo rm -f "$GEMFILE"
    - remote: sudo /opt/chef/embedded/bin/gem install chef-cli --no-doc && sudo ln -sf /opt/chef/embedded/bin/chef-cli /usr/local/bin/chef-cli
    # - remote: sudo /opt/chef/embedded/bin/gem uninstall ffi -v '> 1.16.3' --force --executables 2>/dev/null; sudo /opt/chef/embedded/bin/gem uninstall ffi --platform arm64-darwin --force --executables 2>/dev/null; sudo /opt/chef/embedded/bin/gem uninstall ffi --platform x86_64-darwin --force --executables 2>/dev/null; true
    - remote: sudo rm -f /opt/chef/embedded/bin/{htmldiff,ldiff}
    - remote: echo "Installed Chef / Ohai release:"
    - remote: /opt/chef/bin/chef-client -v
    - remote: /opt/chef/bin/ohai -v

platforms:
  - name: macos-26 # arm64
  - name: macos-15-intel # x86_64
  - name: macos-15 # arm64
  - name: macos-14 # arm64
