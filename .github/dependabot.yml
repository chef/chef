version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    target-branch: "main"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - "Type: Chore"

  - package-ecosystem: bundler
    directory: "/"
    target-branch: "chef-18"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - "Type: Chore"

  - package-ecosystem: bundler
    directory: "/omnibus"
    target-branch: "chef-18"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - "Type: Chore"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - "Type: Chore"
