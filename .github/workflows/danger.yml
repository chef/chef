---
name: danger

on: pull_request

concurrency:
  group: danger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  danger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: danger/danger-js@13.0.5
        with:
          args: "--verbose --text-only -f"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
