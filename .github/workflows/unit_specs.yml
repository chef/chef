---
name: unit_specs

"on":
  pull_request:
    branches: [main, "chef-*"]
  push:
    branches: [main, "chef-*"]

permissions:
  contents: read

concurrency:
  group: unit-specs-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  CHEF_LICENSE: accept-no-persist
  FORCE_FFI_YAJL: ext

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      x86_tag: ${{ steps.tags.outputs.x86_tag }}
      arm_tag: ${{ steps.tags.outputs.arm_tag }}
    steps:
      - id: tags
        run: |
          echo "x86_tag=3.0.39" >> $GITHUB_OUTPUT
          echo "arm_tag=aarch64" >> $GITHUB_OUTPUT

  unit:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - windows-2022
          - windows-2025
          - macos-14
          - macos-15
        ruby: ["3.4"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Configure git line endings (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false
        shell: pwsh
      - uses: actions/checkout@v6
        with:
          clean: true
      - name: Install native deps (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libarchive-dev libffi-dev libyaml-dev
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false
      - name: Create unit test node fixtures
        run: mkdir -p spec/data/nodes && touch spec/data/nodes/test.rb spec/data/nodes/default.rb spec/data/nodes/test.example.com.rb
        shell: bash
      - run: bundle install
      - name: Set RUBY_DLL_PATH for chef-powershell (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gem_lib = gem which chef-powershell 2>$null | Select-Object -First 1
          if ($gem_lib) {
            $gem_path = Split-Path $gem_lib | Split-Path
            echo "RUBY_DLL_PATH=$gem_path/bin/ruby_bin_folder/$env:PROCESSOR_ARCHITECTURE" >> $env:GITHUB_ENV
          }
      - run: bundle exec rake spec:unit
      - run: bundle exec rake component_specs

  unit-docker:
    needs: config
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
            container: chefes/omnibus-toolchain-rocky-9:${{ needs.config.outputs.x86_tag }}
            pkg_mgr: dnf
            label: rocky-9-x86
          - runs-on: ubuntu-24.04-arm
            container: chefes/omnibus-toolchain-rocky-9:${{ needs.config.outputs.arm_tag }}
            pkg_mgr: dnf
            label: rocky-9-arm
          - runs-on: ubuntu-24.04
            container: chefes/omnibus-toolchain-rocky-8:${{ needs.config.outputs.x86_tag }}
            pkg_mgr: dnf
            label: rocky-8-x86
          - runs-on: ubuntu-24.04-arm
            container: chefes/omnibus-toolchain-rocky-8:${{ needs.config.outputs.arm_tag }}
            pkg_mgr: dnf
            label: rocky-8-arm
          - runs-on: ubuntu-24.04
            container: chefes/omnibus-toolchain-debian-11:${{ needs.config.outputs.x86_tag }}
            pkg_mgr: apt
            label: debian-11-x86
          - runs-on: ubuntu-24.04-arm
            container: chefes/omnibus-toolchain-debian-11:${{ needs.config.outputs.arm_tag }}
            pkg_mgr: apt
            label: debian-11-arm
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true
      - name: Install native deps (dnf)
        if: matrix.pkg_mgr == 'dnf'
        run: dnf install -y --enablerepo=devel openssl-devel libarchive-devel libffi-devel libyaml-devel readline-devel zlib-devel
      - name: Install native deps (apt)
        if: matrix.pkg_mgr == 'apt'
        run: |
          apt-get update
          apt-get install -y libssl-dev libarchive-dev libffi-dev libyaml-dev libreadline-dev zlib1g-dev curl
      - name: Install Ruby via rbenv
        run: |
          curl -fsSL https://github.com/rbenv/rbenv-installer/raw/HEAD/bin/rbenv-installer | bash
          export PATH="$HOME/.rbenv/bin:$PATH"
          eval "$(rbenv init -)"
          rbenv install 3.4.8
          rbenv global 3.4.8
          gem install bundler
          echo "$HOME/.rbenv/bin" >> $GITHUB_PATH
          echo "$HOME/.rbenv/shims" >> $GITHUB_PATH
      - name: Create unit test node fixtures
        run: mkdir -p spec/data/nodes && touch spec/data/nodes/test.rb spec/data/nodes/default.rb spec/data/nodes/test.example.com.rb
      - run: bundle install
      - run: bundle exec rake spec:unit
      - run: bundle exec rake component_specs
