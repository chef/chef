---
name: lint

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: lint-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  cookstyle:
    runs-on: ubuntu-latest
    env:
      BUNDLE_WITHOUT: ruby_shadow:packaging
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: false
      - uses: r7kamura/rubocop-problem-matchers-action@v1  # this shows the failures in the PR
      - run: |
          bundle install
          bundle exec cookstyle --chefstyle -c .rubocop.yml

  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl --location 'https://raw.githubusercontent.com/chef/chef_dictionary/main/chef.txt' --output chef_dictionary.txt
      - uses: streetsidesoftware/cspell-action@v8.4.0

  linelint:
    runs-on: ubuntu-latest
    name: Check if all files end in newline
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Linelint
        uses: fernandrone/linelint@master
        id: linelint

  architecture-diagram:
    runs-on: ubuntu-latest
    name: Validate architecture Mermaid diagram
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Render architecture diagram
        run: |
          chmod +x scripts/validate_architecture_diagram.sh
          scripts/validate_architecture_diagram.sh

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret scanning (gitleaks)
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --log-opts "origin/main..HEAD" \
            --report-format json \
            --report-path /tmp/gitleaks-report.json
      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: /tmp/gitleaks-report.json
