---
name: func_spec

"on":
  pull_request:
    branches: [main, "chef-*"]
  push:
    branches: [main, "chef-*"]

permissions:
  contents: read

concurrency:
  group: func-spec-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  CHEF_LICENSE: accept-no-persist
  FORCE_FFI_YAJL: ext

jobs:
  functional:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - windows-2022
          - windows-2025
          - macos-14
          - macos-15
        ruby: ["3.4"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Install native deps (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get install -y libssl-dev libarchive-dev libffi-dev libyaml-dev
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false
      - run: bundle install
      - name: Configure WinRM for functional tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: winrm quickconfig -q
      - name: Set RUBY_DLL_PATH for chef-powershell (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gem_lib = gem which chef-powershell 2>$null | Select-Object -First 1
          if ($gem_lib) {
            $gem_path = Split-Path $gem_lib | Split-Path
            echo "RUBY_DLL_PATH=$gem_path/bin/ruby_bin_folder/$env:PROCESSOR_ARCHITECTURE" >> $env:GITHUB_ENV
          }
      - name: Fix Windows PowerShell module paths for subprocesses (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Propagate the machine-level PSModulePath into GITHUB_ENV so that
          # all child processes (including powershell.exe -NoProfile subshells
          # spawned by specs) inherit it. Without this the Security module DLL
          # cannot be resolved when starting PS5.1 from a D:\ working dir.
          $machinePath = [System.Environment]::GetEnvironmentVariable("PSModulePath", "Machine")
          echo "PSModulePath=$machinePath" >> $env:GITHUB_ENV
      - name: Install NuGet PackageProvider for functional tests (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-PackageProvider -Name NuGet -Force -ErrorAction SilentlyContinue
      - run: bundle exec rake spec:functional

  functional-rocky:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
            container: chefes/omnibus-toolchain-rocky-9:3.0.39
          - runs-on: ubuntu-24.04-arm
            container: chefes/omnibus-toolchain-rocky-9:aarch64
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.container }}
      options: --privileged
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies and Ruby via rbenv
        run: |
          dnf install -y --enablerepo=devel openssl-devel libarchive-devel libffi-devel libyaml-devel readline-devel zlib-devel
          curl -fsSL https://github.com/rbenv/rbenv-installer/raw/HEAD/bin/rbenv-installer | bash
          export PATH="$HOME/.rbenv/bin:$PATH"
          eval "$(rbenv init -)"
          rbenv install 3.4.8
          rbenv global 3.4.8
          gem install bundler
          echo "$HOME/.rbenv/bin" >> $GITHUB_PATH
          echo "$HOME/.rbenv/shims" >> $GITHUB_PATH
      - run: bundle install
      - run: bundle exec rake spec:functional

  choco:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
        ruby: ["3.4"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: false
    - run: |
        gem uninstall date --all --ignore-dependencies || true
        gem install date --version 3.3.3 --platform=ruby
        bundle install
        bundle exec rspec spec/functional/resource/chocolatey_package_spec.rb
  userdefaults:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
        ruby: ["3.4"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: false
    - run: bundle install
    - run: sudo bundle exec rspec spec/functional/resource/macos_userdefaults_spec.rb
