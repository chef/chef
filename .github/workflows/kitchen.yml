---
name: kitchen

"on":
  pull_request:
  push:
    branches:
      - chef-18

concurrency:
  group: kitchen-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: kitchen-tests

jobs:
  win_x86_64:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2025
          - windows-2022
    runs-on: ${{ matrix.os }}
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.exec.windows.yml
      CHEF_WORKSTATION_VERSION: "25.5.1084"
    steps:
    - uses: actions/checkout@v5
    - name: Install Chef
      uses: actionshub/chef-install@5.0.2
    - name: Kitchen Test
      run: | 
        $env:PATH = "C:\opscode\chef-workstation\bin;C:\opscode\chef-workstation\embedded\bin;" + $env:PATH
        gem install appbundler appbundle-updater --no-doc
        kitchen test end-to-end-${{ matrix.os }}

  mac_arm64:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-26
    runs-on: ${{ matrix.os }}
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.exec.macos.yml
      EXPECTED_CHEF_WORKSTATION_VERSION: "25.5.1084"
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          clean: true
      - name: Install Chef
        uses: actionshub/chef-install@5.0.2
      - name: Kitchen Test
        run: kitchen test end-to-end-${{ matrix.os }}

  docr_lnx_x86_64:
    strategy:
      fail-fast: false
      matrix:
        os:
          - amazonlinux-2023
          - almalinux-8
          - almalinux-9
          - almalinux-10
          - debian-11
          - debian-12
          - fedora-40
          # - fedora-latest
          - opensuse-leap-15
          - oraclelinux-8
          - oraclelinux-9
          - oraclelinux-10
          - rockylinux-8
          - rockylinux-9
          - rockylinux-10
          - ubuntu-2004
          - ubuntu-2204
          - ubuntu-2404
    runs-on: ubuntu-latest
    env:
      FORCE_FFI_YAJL: ext
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.dokken.yml
      EXPECTED_CHEF_WORKSTATION_VERSION: "25.5.1084"
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - name: Install Chef
        uses: actionshub/chef-install@5.0.2
      - name: Downgrade Docker to 28.0.4
        run: |
          # Remove existing Docker
          sudo apt-get remove -y docker docker-engine docker.io containerd runc moby-engine moby-cli || true

          # Install Docker's official GPG key
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          # Add Docker repository
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

          # Install Docker 28.0.4
          sudo apt-get update
          sudo apt-get install -y --allow-downgrades docker-ce=5:28.0.4-1~ubuntu.24.04~noble docker-ce-cli=5:28.0.4-1~ubuntu.24.04~noble containerd.io
          docker --version
      - name: Kitchen Test
        run: kitchen test end-to-end-${{ matrix.os }}

