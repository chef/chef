---
name: kitchen

"on":
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: kitchen-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: kitchen-tests

jobs:
  # test-kitchen-enterprise currently supports only kitchen-dokken driver for linux platforms,
  # so we are testing windows using community test-kitchen
  win_x86_64:
    strategy:
      fail-fast: false
      matrix:
        os:
          # - windows-2025 - no kitchen support yet
          - windows-2022
    runs-on: ${{ matrix.os }}
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.exec.windows.yml
    steps:
    - uses: actions/checkout@v4
    - name: Install Chef
      uses: actionshub/chef-install@3.0.0
    - name: Kitchen Test
      run: kitchen test end-to-end-${{ matrix.os }}

  # test-kitchen-enterprise currently supports only kitchen-dokken driver for linux platforms,
  # so we are testing macos using community test-kitchen
  mac_x86_64:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-13
    runs-on: ${{ matrix.os }}
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.exec.macos.yml
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
            clean: true
      - name: Install Chef
        uses: actionshub/chef-install@3.0.0
      - name: Kitchen Test
        run: kitchen test end-to-end-${{ matrix.os }}

  mac_arm64:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14 # currently macos-latest
          - macos-15
    runs-on: ${{ matrix.os }}
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.exec.macos.yml
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Install Chef
        uses: actionshub/chef-install@3.0.0
      - name: Kitchen Test
        run: kitchen test end-to-end-${{ matrix.os }}

  # end-to-end recipe testing using test-kitchen-enterprise and habitat package of Infra Client
  docr_lnx_x86_64:
    strategy:
      fail-fast: false
      matrix:
        os:
          - amazonlinux-2023
          - almalinux-8
          - almalinux-9
          - debian-11
          - debian-12
          - fedora-40
          # fedora-latest
          - opensuse-leap-15
          - oraclelinux-8
          - oraclelinux-9
          - rockylinux-8
          - rockylinux-9
          - ubuntu-2004
          - ubuntu-2204
          # - ubuntu-2404
    runs-on: ubuntu-latest
    env:
      FORCE_FFI_YAJL: ext
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.dokken.yml
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Install Habitat CLI
        env:
          HAB_AUTH_TOKEN: ${{ secrets.HAB_AUTH_TOKEN }}
        run: |
          curl https://raw.githubusercontent.com/habitat-sh/habitat/main/components/hab/install.sh | bash -s -- -c stable
          sudo hab license accept
          sudo hab --version
      - name: Build Habitat Package
        run: |
          cd chef/habitat
          hab pkg build .
          cp /hab/cache/artifacts/chef-infra-client-*.hart kitchen-tests/chef-infra-client-latest.hart
      - name: Kitchen Test
        run: kitchen test end-to-end-${{ matrix.os }}

  # test-kitchen-enterprise currently supports only kitchen-dokken driver for linux platforms,
  # so we are testing on linux VMs using community test-kitchen
  vm_lnx_x86_64:
    strategy:
      fail-fast: false
      matrix:
        os:
          - amazonlinux-2
          - amazonlinux-2023
          - almalinux-8
          - almalinux-9
          - debian-11
          - debian-12
          - fedora-40
          # - fedora-latest
          - opensuse-leap-15
          - oracle-7
          - oracle-8
          - oracle-9
          - rockylinux-8
          - rockylinux-9
          - ubuntu-2004
          - ubuntu-2204
          # - ubuntu-2404
    runs-on: ubuntu-22.04
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.linux.ci.yml
    steps:
      - uses: actions/checkout@v4
      - name: Install Vagrant and VirtualBox
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg
          cat files/oracle_vbox_2016.asc | gpg --dearmor | sudo tee /usr/share/keyrings/oracle-virtualbox-2016.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/oracle-virtualbox-2016.gpg] https://download.virtualbox.org/virtualbox/debian $(lsb_release -cs) contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo apt-get update
          sudo apt-get install -y vagrant virtualbox-7.1
          sudo vagrant --version
          sudo VBoxManage --version
      - name: Install Chef
        uses: actionshub/chef-install@3.0.0
      - name: Kitchen Test
        run: |
          # To debug, uncomment these
          #export VAGRANT_LOG=debug
          #export VBOX_LOG=all.e.l.f
          #export VBOX_LOG_DEST=stdout
          #export K_DEBUG_OPTS="--log-level=debug"
          export LOGNAME=$USER
          kitchen test end-to-end-${{ matrix.os }} $K_DEBUG_OPTS
