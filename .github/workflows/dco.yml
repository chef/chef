name: DCO Check
on: [pull_request]

permissions: {}

jobs:
  dco_check_job:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    name: DCO Check
    steps:
    - name: Get PR Commits
      uses: actionshub/get-pr-commits@main
      id: 'get-pr-commits'
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: DCO Check
      uses: actionshub/dco@main
      with:
        commits: ${{ steps.get-pr-commits.outputs.commits }}
        allow-obvious-fix-label: "obvious-fix"
