---
# Expeditor's built-in habitat/build does not support aarch64-darwin targets.
# This pipeline builds the aarch64-darwin habitat package inside an Anka VM
# and uploads it to the habitat builder (unstable channel).

expeditor:
  defaults:
    buildkite:
      timeout_in_minutes: 120
      retry:
        automatic:
          limit: 1

steps:

  - label: ":habicat: Build aarch64-darwin habitat package"
    agents:
      queue: habitat-aarch64-darwin
    plugins:
      - chef/anka#v0.7.2:
          vm-name: buildkite-core-14-arm64
          always-pull: true
          wait-network: true
          inherit-environment-vars: true
      - chef/habitat#main:
          build: .
    env:
      HAB_NONINTERACTIVE: "true"
      HAB_NOCOLORING: "true"
      HAB_STUDIO_SECRET_HAB_NONINTERACTIVE: "true"
