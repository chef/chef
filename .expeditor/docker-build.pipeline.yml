---
expeditor:
  defaults:
    buildkite:
      timeout_in_minutes: 60

steps:
- label: ":docker: build chef-hab amd64"
  agents:
    queue: default-privileged
  expeditor:
    secrets:
      HAB_AUTH_TOKEN:
        path: account/static/habitat/chef-ci
        field: auth_token
    executor:
      linux:
        privileged: true
        propagate-environment: true
        environment:
          - HAB_AUTH_TOKEN
  command: .expeditor/build-docker-images.sh amd64

- label: ":docker: build chef-hab arm64"
  agents:
    queue: default-privileged-aarch64
  expeditor:
    secrets:
      HAB_AUTH_TOKEN:
        path: account/static/habitat/chef-ci
        field: auth_token
    executor:
      linux:
        privileged: true
        propagate-environment: true
        environment:
          - HAB_AUTH_TOKEN
  command: .expeditor/build-docker-images.sh arm64

- wait

- label: ":docker: create manifest for multi arch"
  command: .expeditor/docker-manifest-create.sh
